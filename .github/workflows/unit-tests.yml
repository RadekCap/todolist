name: Unit Tests
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

concurrency:
  group: unit-tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit
